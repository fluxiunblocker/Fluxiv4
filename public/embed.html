<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embedded Site</title>
  <style>
    /* Make iframe take full viewport */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe src="https://gs76ml-8080.csb.app/main.html" allowfullscreen sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
</body>
</html>
